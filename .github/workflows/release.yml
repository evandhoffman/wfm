name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build and publish release binaries
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Build linux/amd64
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
            go build -trimpath -ldflags="-s -w" -o wfm-linux-amd64 ./...

      - name: Build linux/arm64
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 \
            go build -trimpath -ldflags="-s -w" -o wfm-linux-arm64 ./...

      - name: Verify static linkage
        run: |
          file wfm-linux-amd64 | grep -q "statically linked" || \
            { echo "amd64 binary is not statically linked"; exit 1; }

      - name: Create GitHub release and upload binaries
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            wfm-linux-amd64 \
            wfm-linux-arm64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
